<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120">

  <!-- Background (matches site navy) -->
  <rect width="320" height="120" fill="#0B1929"/>

  <!-- ── Monogram badge ── -->
  <!-- Outer chamfered border -->
  <path d="M24 4 L56 4 L63 11 L63 41 L56 48 L24 48 L17 41 L17 11 Z"
        stroke="url(#lg1)" stroke-width="1.1" fill="none"/>
  <!-- Inner subtle border -->
  <path d="M26 7.5 L54 7.5 L59.5 13 L59.5 39 L54 44.5 L26 44.5 L20.5 39 L20.5 13 Z"
        stroke="url(#lg1)" stroke-width="0.5" fill="none" opacity="0.3"/>
  <!-- Diamond accent -->
  <polygon points="40,11 42.5,14 40,17 37.5,14"
           stroke="url(#lg1)" stroke-width="0.8" fill="none"/>
  <circle cx="40" cy="14" r="0.9" fill="url(#lg1)"/>
  <!-- DDA monogram -->
  <text x="40" y="34" text-anchor="middle"
        font-family="Playfair Display, Georgia, serif"
        font-size="13.5" font-weight="700" letter-spacing="1.5"
        fill="url(#lg1)">DDA</text>
  <!-- Separator line -->
  <line x1="22" y1="39.5" x2="58" y2="39.5"
        stroke="url(#lg1)" stroke-width="0.55" opacity="0.45"/>

  <!-- ── Wordmark ── -->
  <text x="80" y="28" font-family="Playfair Display, Georgia, serif"
        font-size="19" font-weight="700" letter-spacing="0.5"
        fill="url(#lg2)">Dental Digital Agency</text>
  <!-- Thin gold rule -->
  <line x1="80" y1="36" x2="307" y2="36"
        stroke="url(#lg2)" stroke-width="0.6" opacity="0.4"/>
  <!-- Tagline -->
  <text x="80" y="50" font-family="Raleway, Arial, sans-serif"
        font-size="9" font-weight="400" letter-spacing="3.5"
        fill="#7A8FA8" text-anchor="start">PREMIUM DENTAL MARKETING · UK</text>

  <defs>
    <linearGradient id="lg1" x1="17" y1="4" x2="63" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#8B6E28"/>
      <stop offset="50%"  stop-color="#C49A3C"/>
      <stop offset="100%" stop-color="#DEB96A"/>
    </linearGradient>
    <linearGradient id="lg2" x1="80" y1="0" x2="307" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#8B6E28"/>
      <stop offset="40%"  stop-color="#C49A3C"/>
      <stop offset="100%" stop-color="#DEB96A"/>
    </linearGradient>
  </defs>
</svg>
